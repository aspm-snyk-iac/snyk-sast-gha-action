name: snyk-sast-gha

on: [workflow_dispatch]

jobs:
  snyk-sast-scan-job:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read 
    outputs:
      snyk-sast-job-output-critical: ${{ steps.snyk-sast-step.outputs.critical-count }}
      snyk-sast-job-output-very-high: ${{ steps.snyk-sast-step.outputs.very-high-count }}
      snyk-sast-job-output-high: ${{ steps.snyk-sast-step.outputs.high-count }}
      snyk-sast-job-output-medium: ${{ steps.snyk-sast-step.outputs.medium-count }}
      snyk-sast-job-output-low: ${{ steps.snyk-sast-step.outputs.low-count }}
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Print GITHUB_RUN_ID
        shell: bash
        run: |
          echo "Ref name is $GITHUB_RUN_ID"
          echo "Source is ${{ github.server_url }}/${{ github.repository }}"
          echo "Subject is $GITHUB_WORKFLOW_REF|${{ github.run_id }}|${{ github.run_attempt }}|${{ github.run_number }}"
          echo "Job is $GITHUB_JOB"
          echo "Step id is ${{ steps.internal.id }}"

      - id: snyk-sast-step
        name: Snyk SAST Scan
        uses: cloudbees-io-gha/snyk-sast-publish@v1
        with:
          snyk-token: ${{ secrets.SNYK_TOKEN }}
          org-id: ${{ vars.SNYK_ORG_ID }}

      - id: print-outputs-from-snyk-sast-step
        name: Print outputs from the upstream Snyk SAST Scan step
        run: |
          # Printing all outputs
          echo "Outputs from upstream Snyk SAST Scan step:"
          echo "Critical count: ${{ steps.snyk-sast-step.outputs.critical-count }}"
          echo "Very high count: ${{ steps.snyk-sast-step.outputs.very-high-count }}"
          echo "High count: ${{ steps.snyk-sast-step.outputs.high-count }}"
          echo "Medium count: ${{ steps.snyk-sast-step.outputs.medium-count }}"
          echo "Low count: ${{ steps.snyk-sast-step.outputs.low-count }}"
